app = "idf-auth"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  APP_BASE_URL = "https://auth.idf.dev"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
